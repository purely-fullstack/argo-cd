apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rajureddy-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Optional: Enable automatic HTTPS via cert-manager (if installed)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: rajureddy.live
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-svc      # 👈 your frontend service name
            port:
              number: 80

  - host: api.rajureddy.live
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway-svc       # 👈 your API gateway service name
            port:
              number: 8080

  tls:
  - hosts:
      - rajureddy.live
      - api.rajureddy.live
    secretName: rajureddy-tls       # 👈 cert-manager will create this automatically
